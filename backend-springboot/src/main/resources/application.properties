server.port=${PORT:8080}
spring.application.name=agri-invest-backend

# Persist application data in MongoDB Atlas on Render. For local development, you
# can either provide MONGODB_URI or run a local MongoDB instance.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/agri_invest?serverSelectionTimeoutMS=3000&connectTimeoutMS=3000&socketTimeoutMS=3000}

# Payment configuration
razorpay.key=${RAZORPAY_KEY:}
razorpay.secret=${RAZORPAY_SECRET:}

# External AI services
ai.module.url=${AI_MODULE_URL:http://127.0.0.1:5001/recommend-crop}
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-1.5-flash}

# Frontend origins allowed to call this backend
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
